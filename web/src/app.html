<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: the dark canvas runs under the iOS status bar in
         standalone; mobile surfaces pad with env(safe-area-inset-top) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sprout" />
    <meta name="theme-color" content="#0d0c0a" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />

    <!-- Neo-brutalist type: Archivo (structural grotesque) +
         IBM Plex Mono (figures). Space fonts kept loaded as an easy revert path. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- apply the saved theme before first paint to avoid a light/dark flash -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('sprout-theme') === 'light' ? 'light' : 'dark';
      } catch (e) {}
    </script>

    <!-- three.js + addons (VOXLoader, TransformControls) and lil-gui are now npm
         deps imported as ES modules from src/lib/three/garden/ — no global CDN
         scripts. See the garden module for the modern-three setup. -->

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
